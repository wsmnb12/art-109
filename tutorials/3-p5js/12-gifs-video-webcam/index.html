<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIFS AND VIDSSSSS</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <main>
        <iframe width="560" height="315" src="https://www.youtube.com/embed/ZtpIDJB79fg?si=gi4fYC47StSnfxcf"
            title="YouTube video player" frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

        <img src="media/bear.gif" alt="A GIF of a bear dancing" class="dancing-bear">
        <div class="keep-on-dancing">
            <p>keep on dancin'! keep on dancin'!keep on dancin'!keep on dancin'!keep on dancin'!keep on dancin'!keep on
                dancin'!keep on dancin'!keep on dancin'!
                <img src="media/get_down.gif" alt="A GIF of a person dancing" class="dancer">
            </p>
        </div>

        <!-- Hover video -->

        <video class="hover-videos" width="180" height="180" autoplay muted loop>
            <source src="media/collin.mp4" type="video/mp4">
        </video>
        <video class="hover-videos" width="180" height="180" autoplay muted loop>
            <source src="media/dreams.mp4" type="video/mp4">
        </video>

        <!-- click on play video  -->
        <video class="click-videos" width="180" height="180" autoplay muted loop>
            <source src="media/dreams.mp4" type="video/mp4">
        </video>


        <video id="webcam" autoplay playsinline></video>
    </main>
    <script src="js/video.js"></script>
    <script src="js/webcam.js"></script>
</body>


</html>
